server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - every unknown path serves the app shell, the router takes it from there.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
