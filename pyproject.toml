[tool.pytest.ini_options]
# Every module's tests/test_manifest.py shares a basename across
# modules/*/tests/ with no __init__.py (modules are intentionally not
# Python packages - see docs/MODULES.md). The default "prepend" import
# mode collides on that basename; importlib mode gives each file its own
# synthetic module identity instead.
addopts = "--import-mode=importlib"
testpaths = ["modules"]
