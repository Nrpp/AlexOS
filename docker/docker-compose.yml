# Production. One command from the repo root:
#   docker compose -f docker/docker-compose.yml up -d
# Build contexts are the repo root so npm/pip can see the monorepo's
# shared packages and the modules/ directory.
services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      ALEXOS_CORS_ORIGINS: ${ALEXOS_CORS_ORIGINS:-http://localhost}
    # Host networking (Linux only - this is what the Pi runs) so
    # modules/media can discover Cast devices via mDNS/multicast, which
    # doesn't cross Docker's default bridge network. This gives the
    # container full access to the LAN, same as any process running
    # directly on the host - a deliberate tradeoff, not a default to
    # copy elsewhere without thinking about it again. `ports:` is
    # dropped because it's incompatible with network_mode: host - the
    # container binds directly to the host's port 8000.
    network_mode: host
    volumes:
      - alexos_data:/srv/api/data
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  alexos_data:
