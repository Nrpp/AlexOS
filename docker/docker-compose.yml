# Production. One command from the repo root:
#   docker compose -f docker/docker-compose.yml up -d
# Build contexts are the repo root so npm/pip can see the monorepo's
# shared packages and the modules/ directory.
services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      ALEXOS_CORS_ORIGINS: ${ALEXOS_CORS_ORIGINS:-http://localhost}
    # Host networking (Linux only - this is what the Pi runs) so
    # modules/media can discover Cast devices via mDNS/multicast, which
    # doesn't cross Docker's default bridge network. This gives the
    # container full access to the LAN, same as any process running
    # directly on the host - a deliberate tradeoff, not a default to
    # copy elsewhere without thinking about it again. `ports:` is
    # dropped because it's incompatible with network_mode: host - the
    # container binds directly to the host's port 8000.
    network_mode: host
    volumes:
      - alexos_data:/srv/api/data
      # Lets modules/servers list and start/stop/restart Docker
      # containers on the host (see modules/servers/README.md). This is
      # a significant security tradeoff: anything with access to the
      # Docker socket has root-equivalent control over the host - it
      # can start a container with `-v /:/host` and read/write anything.
      # Only acceptable here because this is a single-user personal
      # device, not a shared or internet-facing host. Comment this line
      # out if you'd rather keep Servers' container features disabled.
      - /var/run/docker.sock:/var/run/docker.sock
      # Lets modules/control_center's nmcli/bluetoothctl commands reach
      # the host's NetworkManager/BlueZ over D-Bus to control WiFi and
      # Bluetooth (see modules/control_center/README.md). Another real
      # host-privilege tradeoff, same category as the Docker socket
      # above - the system D-Bus reaches many host services, not just
      # network/bluetooth. Comment out if you'd rather keep the
      # control center's WiFi/Bluetooth features disabled.
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  alexos_data:
